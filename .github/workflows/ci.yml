name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, test and build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # The Edge Functions load a bundled copy of the solver and config
      # (src/lib can't be imported from Deno). Rebuild it and fail if the checked-in
      # bundle is stale — a solver change that forgets to rebuild would ship a
      # deployed function running old rules.
      - run: npm run build:edge-bundles
      - name: Edge bundles are up to date
        run: git diff --exit-code supabase/functions/_shared/

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run test

      # Catches an adapter or runtime misconfiguration here rather than on Vercel.
      - run: npm run build

  db-tests:
    name: RLS and schedule visibility against a real Supabase
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Build the Edge Function bundle before the stack comes up, so the
      # play-lifecycle functions the contract tests hit are the current code.
      - run: npm run build:edge-bundles

      # The RLS assertions and the HTTP contract are only meaningful against the
      # real policy engine and the real Edge Functions, so bring up a local
      # Supabase (which also serves the functions) and run them against it — never
      # a mock.
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase start

      - run: npm run test:db

      # The seed uses the solver core to write real boards — running it after the
      # RLS tests proves the seed path stays green without contending for dates.
      - run: npm run seed
